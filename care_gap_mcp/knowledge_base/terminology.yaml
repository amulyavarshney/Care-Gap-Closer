# Terminology — coding sets referenced by care_gap_rules.yaml.
#
# Each top-level key is a code_set name (used in the rules YAML). Conservative
# by design: expanding a set should be a clinical-review change, so we keep
# membership small and explicit. New codes are easy to add when needed.
#
# system: a FHIR canonical URL (do not change — these are HL7 standard)
# match:  exact | prefix
# codes:  list of code strings to include

# ── Diagnosis sets ────────────────────────────────────────────────────────────

diabetes_snomed:
  system: http://snomed.info/sct
  match: exact
  codes:
    - "44054006"           # Diabetes mellitus type 2
    - "73211009"           # Diabetes mellitus
    - "46635009"           # Diabetes mellitus type 1

diabetes_icd10:
  system: http://hl7.org/fhir/sid/icd-10-cm
  match: prefix
  codes:
    - "E10"                # Type 1 diabetes
    - "E11"                # Type 2 diabetes
    - "E13"                # Other specified diabetes

hypertension_snomed:
  system: http://snomed.info/sct
  match: exact
  codes:
    - "38341003"           # Essential hypertension
    - "59621000"           # Essential (primary) hypertension

hypertension_icd10:
  system: http://hl7.org/fhir/sid/icd-10-cm
  match: prefix
  codes:
    - "I10"                # Essential (primary) hypertension
    - "I11"                # Hypertensive heart disease
    - "I12"                # Hypertensive CKD
    - "I13"                # Hypertensive heart and CKD
    - "I15"                # Secondary hypertension

tobacco_use_snomed:
  system: http://snomed.info/sct
  match: exact
  codes:
    - "77176002"           # Smoker
    - "65568007"           # Cigarette smoker
    - "428041000124106"    # Current every day smoker

# ── Observation (lab/vital) codes ─────────────────────────────────────────────

a1c_loinc:
  system: http://loinc.org
  match: exact
  codes:
    - "4548-4"             # Hemoglobin A1c

systolic_bp_loinc:
  system: http://loinc.org
  match: exact
  codes:
    - "8480-6"             # Systolic blood pressure

lipid_panel_loinc:
  system: http://loinc.org
  match: exact
  codes:
    - "2093-3"             # Total cholesterol
    - "13457-7"            # LDL cholesterol
    - "57698-3"            # Lipid panel

phq9_loinc:
  system: http://loinc.org
  match: exact
  codes:
    - "44249-1"            # PHQ-9 total score

# ── Procedure codes ───────────────────────────────────────────────────────────

colonoscopy_cpt:
  system: http://www.ama-assn.org/go/cpt
  match: exact
  codes:
    - "45378"              # Colonoscopy, flexible; diagnostic
    - "45380"              # Colonoscopy with biopsy
    - "45385"              # Colonoscopy with polyp removal

fit_cpt:
  system: http://www.ama-assn.org/go/cpt
  match: exact
  codes:
    - "82270"              # FIT / fecal immunochemical test

mammography_cpt:
  system: http://www.ama-assn.org/go/cpt
  match: exact
  codes:
    - "77065"              # Diagnostic mammography, unilateral
    - "77066"              # Diagnostic mammography, bilateral
    - "77067"              # Screening mammography, bilateral

pap_smear_cpt:
  system: http://www.ama-assn.org/go/cpt
  match: exact
  codes:
    - "88142"              # Cervical cytology, thin layer prep
    - "88150"              # Cervical cytology, manual screening
    - "88164"              # Cervical cytology, thin layer, manual screening

hpv_cotest_cpt:
  system: http://www.ama-assn.org/go/cpt
  match: exact
  codes:
    - "87624"              # HPV high-risk types

lung_ct_screening_cpt:
  system: http://www.ama-assn.org/go/cpt
  match: exact
  codes:
    - "71271"              # Low-dose CT, lung cancer screening

dexa_scan_cpt:
  system: http://www.ama-assn.org/go/cpt
  match: exact
  codes:
    - "77080"              # DEXA bone density, axial skeleton

# ── Immunization (CVX) codes ───────────────────────────────────────────────────

influenza_cvx:
  system: http://hl7.org/fhir/sid/cvx
  match: exact
  codes:
    - "88"                 # Influenza, unspecified formulation
    - "141"                # Influenza, seasonal, injectable
    - "150"                # Influenza, high-dose seasonal
    - "158"                # Influenza, injectable, quadrivalent

tdap_cvx:
  system: http://hl7.org/fhir/sid/cvx
  match: exact
  codes:
    - "115"                # Tdap
    - "07"                 # Td (adult)

pneumococcal_cvx:
  system: http://hl7.org/fhir/sid/cvx
  match: exact
  codes:
    - "33"                 # Pneumococcal polysaccharide PPSV23
    - "133"                # Pneumococcal conjugate PCV13
    - "215"                # Pneumococcal conjugate PCV20

zoster_cvx:
  system: http://hl7.org/fhir/sid/cvx
  match: exact
  codes:
    - "187"                # Zoster recombinant (Shingrix)

# ── Labels (display strings shown back to users when a code matches) ──────────
# Optional — used by ListRecentObservations to label otherwise unlabeled codes.

labels:
