    "85354-9": Blood pressure panel
    "8480-6": Systolic BP
    "8462-4": Diastolic BP
    "2093-3": Total cholesterol
    "13457-7": LDL
    "2085-9": HDL
    "57698-3": Lipid panel
    "44249-1": PHQ-9 depression score
  cpt:
    "45378": Colonoscopy
    "45380": Colonoscopy with biopsy
    "45385": Colonoscopy with polyp removal
    "45330": Sigmoidoscopy
    "82270": FIT (fecal immunochemical test)
    "77065": Mammography (diagnostic, unilateral)
    "77066": Mammography (diagnostic, bilateral)
    "77067": Mammography (screening, bilateral)
    "88142": Pap smear (thin layer)
    "88150": Pap smear (manual screening)
    "88164": Pap smear (thin layer, manual screening)
    "87624": HPV high-risk co-test
    "71271": Low-dose CT lung cancer screening
    "77080": DEXA bone density scan
  cvx:
    "88": Influenza vaccine
    "141": Influenza vaccine (seasonal, injectable)
    "150": Influenza vaccine (high-dose)
    "158": Influenza vaccine (quadrivalent)
    "115": Tdap vaccine
    "07": Td vaccine
