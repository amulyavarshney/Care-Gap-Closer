# Care Gap Rules — USPSTF-aligned, deterministic.
#
# This file is the source of truth for what the rule engine flags. The Python
# rule engine in tools/care_gaps.py reads it at startup; never edit the engine
# to add a gap — edit this file instead.
#
# Each rule must specify:
#   id              snake-case identifier (also used as the gap_id in outputs)
#   title           clinician-facing one-line title
#   severity        high | medium | low
#   uspstf_grade    A | B | C | I (USPSTF letter grade)
#   triggers        what FHIR signals must be present to flag this gap
#   thresholds      what makes the signal stale (the "overdue" criterion)
#   demographics    optional age range / gender filter
#
# Triggers reference coding sets defined in terminology.yaml by name.
#
# thresholds supports four shapes (see tools/care_gaps.py _build_evidence):
#   observation:      single most-recent-observation staleness check
#   procedure:        single most-recent-procedure staleness check
#   procedure_any:    fires only if ALL listed procedure options are stale
#   immunization:     single most-recent-immunization staleness check
#                      (use max_months_since: 9999 for "any prior dose satisfies")

version: "1.0"
generated_by: "Care Gap Closer MCP — USPSTF + HEDIS-aligned"

rules:

  - id: diabetes-a1c-overdue
    title: HbA1c overdue for diabetic patient
    severity: high
    uspstf_grade: A
    rationale_template: >
      Patients with active diabetes need HbA1c monitoring at least every 6
      months to detect glycemic deterioration before it drives complications.
    triggers:
      condition_in:
        - diabetes_snomed
        - diabetes_icd10
    thresholds:
      observation:
        code_set: a1c_loinc
        max_months_since: 6
    demographics: {}

  - id: hypertension-bp-overdue
    title: Blood pressure check overdue for hypertensive patient
    severity: medium
    uspstf_grade: A
    rationale_template: >
      Patients with active hypertension require BP monitoring at least
      annually; longer gaps mask uncontrolled disease and cardiovascular risk.
    triggers:
      condition_in:
        - hypertension_snomed
        - hypertension_icd10
    thresholds:
      observation:
        code_set: systolic_bp_loinc
        max_months_since: 12
    demographics: {}

  - id: colorectal-screening-overdue
    title: Colorectal cancer screening overdue
    severity: high
    uspstf_grade: A
    rationale_template: >
      USPSTF recommends colorectal cancer screening for adults 45–75. A
      colonoscopy lasts up to 10 years; FIT/FOBT must be repeated annually.
    triggers: {}   # age alone is the trigger here
    thresholds:
      procedure_any:
        - code_set: colonoscopy_cpt
          max_months_since: 120     # 10 years
        - code_set: fit_cpt
          max_months_since: 12      # 1 year
    demographics:
      age_min: 45
      age_max: 75

  - id: mammography-overdue
    title: Mammography overdue
    severity: high
    uspstf_grade: B
    rationale_template: >
      USPSTF recommends biennial screening mammography for women 40–74.
      Adherence to the 24-month cadence is the strongest single predictor of
      stage-at-diagnosis for breast cancer in this age band.
    triggers: {}
    thresholds:
      procedure:
        code_set: mammography_cpt
        max_months_since: 24
    demographics:
      gender: female
      age_min: 40
      age_max: 74

  - id: cervical-screening-overdue
    title: Cervical cancer screening overdue
    severity: high
    uspstf_grade: A
    rationale_template: >
      USPSTF recommends cervical cytology every 3 years, or cytology plus HPV
      co-testing every 5 years, for women 21–65.
    triggers: {}
    thresholds:
      procedure_any:
        - code_set: pap_smear_cpt
          max_months_since: 36        # 3 years
        - code_set: hpv_cotest_cpt
          max_months_since: 60        # 5 years
    demographics:
      gender: female
      age_min: 21
      age_max: 65

  - id: lipid-panel-overdue
    title: Lipid panel overdue
    severity: medium
    uspstf_grade: A
    rationale_template: >
      USPSTF recommends periodic lipid screening for cardiovascular risk
      assessment in adults 40 and older; a 60-month gap exceeds the typical
      re-screening interval.
    triggers: {}
    thresholds:
      observation:
        code_set: lipid_panel_loinc
        max_months_since: 60
    demographics:
      age_min: 40

  - id: lung-cancer-screening-overdue
    title: Lung cancer screening (LDCT) overdue
    severity: high
    uspstf_grade: B
    rationale_template: >
      USPSTF recommends annual low-dose CT lung cancer screening for adults
      50–80 with a significant smoking history.
    triggers:
      condition_in:
        - tobacco_use_snomed
    thresholds:
      procedure:
        code_set: lung_ct_screening_cpt
        max_months_since: 12
    demographics:
      age_min: 50
      age_max: 80

  - id: osteoporosis-screening-overdue
    title: Osteoporosis screening (DEXA) overdue
    severity: medium
    uspstf_grade: B
    rationale_template: >
      USPSTF recommends bone density screening for women 65 and older;
      repeat DEXA intervals commonly follow a 24-month cadence.
    triggers: {}
    thresholds:
      procedure:
        code_set: dexa_scan_cpt
        max_months_since: 24
    demographics:
      gender: female
      age_min: 65

  - id: depression-screening-overdue
    title: Depression screening overdue
    severity: medium
    uspstf_grade: B
    rationale_template: >
      USPSTF recommends depression screening for all adults, with rescreening
      at least annually where risk factors or prior findings warrant it.
    triggers: {}
    thresholds:
      observation:
        code_set: phq9_loinc
        max_months_since: 12
    demographics:
      age_min: 18

  - id: influenza-vaccine-overdue
    title: Influenza vaccine overdue
    severity: low
    uspstf_grade: B
    rationale_template: >
      Annual influenza vaccination is recommended for all adults ahead of
      each respiratory viral season.
    triggers: {}
    thresholds:
      immunization:
        code_set: influenza_cvx
        max_months_since: 12
    demographics:
      age_min: 18

  - id: tdap-vaccine-overdue
    title: Tdap/Td booster overdue
    severity: low
    uspstf_grade: A
    rationale_template: >
      ACIP recommends a Tdap or Td booster every 10 years for adults to
      maintain protection against tetanus, diphtheria, and pertussis.
    triggers: {}
    thresholds:
      immunization:
        code_set: tdap_cvx
        max_months_since: 120        # 10 years
    demographics:
      age_min: 18

  - id: pneumococcal-vaccine-overdue
    title: Pneumococcal vaccine overdue
    severity: medium
    uspstf_grade: B
    rationale_template: >
      ACIP recommends pneumococcal vaccination for adults 65 and older who
      have not previously received one.
    triggers: {}
    thresholds:
      immunization:
        code_set: pneumococcal_cvx
        max_months_since: 9999       # one-time; any prior dose satisfies it
    demographics:
      age_min: 65

  - id: shingles-vaccine-overdue
    title: Shingles vaccine overdue
    severity: low
    uspstf_grade: B
    rationale_template: >
      ACIP recommends the recombinant zoster vaccine (2-dose series) for
      adults 50 and older to prevent herpes zoster and its complications.
    triggers: {}
    thresholds:
      immunization:
        code_set: zoster_cvx
        max_months_since: 9999       # one-time series; any prior dose satisfies it
    demographics:
      age_min: 50
