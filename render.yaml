# Render Blueprint — Care Gap Closer
#
# Deploys two services from this monorepo:
#   1. care-gap-mcp     the SHARP-on-MCP server (FastMCP, Python 3.13)
#   2. care-gap-agent   the A2A v1 agent (Google ADK, Python 3.11)
#
# Both services run on the `starter` plan (no scale-to-zero, no cold start).
# This matters once the agent is registered on a marketplace: a stranger's
# first request must not eat a ~30s free-tier cold-start penalty. If you're
# only running this for local/hackathon demo purposes, you can drop back to
# `plan: free` below to avoid the cost.
#
# ── Secrets to set in the Render dashboard before first deploy ───────────
#   On care-gap-mcp:
#     GOOGLE_API_KEY        Google AI Studio key (sync: false)
#
#   On care-gap-agent:
#     GOOGLE_API_KEY        Google AI Studio key (sync: false)
#     API_KEY_PRIMARY       Bearer used by X-API-Key (sync: false)
#     API_KEYS              Optional comma-separated list of additional keys
#                           (sync: false) — issue one per PO workspace once
#                           this agent is registered for more than one
#                           integration, instead of sharing API_KEY_PRIMARY.
#     MCP_SERVER_URL        Full https URL of care-gap-mcp + /mcp
#                           e.g. https://care-gap-mcp-abcd.onrender.com/mcp
#                           Set AFTER the MCP service deploys and you see its URL.
#
# Render injects PORT for each service; both apps bind 0.0.0.0:$PORT.

services:

  # ── MCP server ───────────────────────────────────────────────────────────
  # Python version comes from care_gap_mcp/.python-version (3.13).
  - type: web
    name: care-gap-mcp
    runtime: python
    plan: starter
    region: oregon
    rootDir: care_gap_mcp
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    # FastMCP reads MCP_HOST and MCP_PORT (see care_gap_mcp/main.py).
    startCommand: MCP_HOST=0.0.0.0 MCP_PORT=$PORT python main.py
    # No healthCheckPath: MCP-over-HTTP only accepts POSTs with
    # `Accept: text/event-stream`, so any GET probe returns 406.
    # Render will fall back to "process is listening on $PORT" as the
    # liveness signal, which is correct for this server.
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash

  # ── A2A agent ────────────────────────────────────────────────────────────
  # Python version comes from care_gap_agent/.python-version (3.11).
  - type: web
    name: care-gap-agent
    runtime: python
    plan: starter
    region: oregon
    rootDir: care_gap_agent
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn care_gap_agent.app:a2a_app --host 0.0.0.0 --port $PORT
    healthCheckPath: /.well-known/agent-card.json
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.10"
      - key: GOOGLE_API_KEY
        sync: false
      - key: API_KEY_PRIMARY
        sync: false
      - key: API_KEYS
        sync: false               # optional: comma-separated extra keys, one per workspace
      - key: MCP_SERVER_URL
        sync: false               # set to https://<mcp-host>.onrender.com/mcp after MCP deploys
      - key: CARE_GAP_AGENT_MODEL
        value: gemini/gemini-2.5-flash
      - key: PO_PLATFORM_BASE_URL
        value: https://app.promptopinion.ai
      - key: CORS_ORIGINS
        value: https://amulyavarshney.github.io,http://localhost:5500,http://127.0.0.1:5500
